<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css">
  <title>WAD Extractor</title>
</head>
<body>
  <main id="app">
    <section id="drop-area">
      <input id="file-input" type="file" accept=".wad,.WAD" />
      <div id="drop-hint">Drop a .wad file here or tap to choose</div>
    </section>

    <section id="info" hidden>
      <div id="header">
        <div><strong>Type:</strong> <span id="wad-type"></span></div>
        <div><strong>Lumps:</strong> <span id="wad-lumpcount"></span></div>
      </div>

      <div id="controls">
        <input id="search" placeholder="Filter lumps by name or index" />
        <button id="download-all">Download Selected as ZIP</button>
      </div>

      <div id="lump-list"></div>
    </section>

    <template id="lump-row-tpl">
      <div class="lump-row">
        <label class="checkbox"><input type="checkbox" class="select-lump" checked /></label>
        <div class="index"></div>
        <div class="name"></div>
        <div class="size"></div>
        <div class="actions">
          <button class="btn btn-small btn-download">Download</button>
          <button class="btn btn-small btn-preview">Preview</button>
        </div>
      </div>
    </template>

    <div id="preview-modal" hidden>
      <div id="preview-content">
        <button id="preview-close" class="btn">Close</button>
        <div id="preview-body"></div>
      </div>
    </div>

    <footer id="notes">
      Tip: select lumps and download individually or as a ZIP. Small, common lump types (PNAMES, PLAYPAL, COLORMAP, flats and simple music lumps) previewable/downloadable.
    </footer>
  </main>

</body>
</html>
